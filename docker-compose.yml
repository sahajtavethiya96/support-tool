# Self-hosted Support Tool — bundled Postgres + app + background worker.
# This is the default, zero-config path:
#
#   1. cp .env.docker.example .env   (set APP_SECRET + NEXT_PUBLIC_APP_URL; optional SMTP)
#   2. docker compose up -d
#
# Already have your own hosted Postgres (Neon, Supabase, RDS, etc.) and don't want this
# bundled one? Use docker-compose.external-db.yml instead — see that file for usage.
#
# The one-shot `migrate` service runs DB migrations + seeds before app/worker start.
#
# NEXT_PUBLIC_* vars (Pusher Beams/Channels) are read from .env automatically at
# build time via the `args:` below — no need to pass --build-arg by hand. If you
# add/change one of those values in .env, you MUST rebuild for it to take effect
# (`docker compose build && docker compose up -d`) — NEXT_PUBLIC_* is baked into
# the browser bundle once at build time, not read live like every other var.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: support
      POSTGRES_DB: support_tool
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_tool"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      args:
        NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID: ${NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID:-}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
    image: support-tool:latest
    command: pnpm setup
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID: ${NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID:-}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
    image: support-tool:latest
    command: pnpm start
    env_file: .env
    expose:
      - "3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID: ${NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID:-}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
    image: support-tool:latest
    command: pnpm worker:start
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
    name: support_tool_pgdata
  # Pinned to a literal name (not just "uploads") on purpose: Docker Compose
  # namespaces unnamed volumes as "<compose-project-name>_<volume-name>". Some
  # deploy tools (observed with Dokploy) don't keep the compose project name
  # perfectly stable across redeploys, which silently creates a NEW, empty
  # volume each time — old uploads aren't deleted, just orphaned and
  # invisible to the new container. Pinning the name guarantees every deploy
  # reattaches to the exact same volume regardless of project-name quirks.
  uploads:
    name: support_tool_uploads
