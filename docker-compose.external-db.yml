# For your own hosted Postgres (Neon, Supabase, RDS, etc.) instead of the bundled
# one in docker-compose.yml — no postgres service here at all, so nothing bundled
# starts. Use this file INSTEAD OF docker-compose.yml (not alongside it):
#
#   1. cp .env.docker.example .env
#   2. Replace DATABASE_URL in .env with your own connection string
#   3. docker compose -f docker-compose.external-db.yml up -d
#
# The one-shot `migrate` service runs DB migrations + seeds before app/worker start,
# against whatever DATABASE_URL you set above.
#
# NEXT_PUBLIC_* vars (Pusher Beams/Channels) are read from .env automatically at
# build time via the `args:` below — no need to pass --build-arg by hand. If you
# add/change one of those values in .env, you MUST rebuild for it to take effect
# (`docker compose -f docker-compose.external-db.yml build && ... up -d`) —
# NEXT_PUBLIC_* is baked into the browser bundle once at build time, not read
# live like every other var.

services:
  migrate:
    build:
      context: .
      args:
        NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID: ${NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID:-}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
    image: support-tool:latest
    command: pnpm setup
    env_file: .env
    restart: "no"

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID: ${NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID:-}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
    image: support-tool:latest
    command: pnpm start
    env_file: .env
    ports:
      - "3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID: ${NEXT_PUBLIC_PUSHER_BEAMS_INSTANCE_ID:-}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-}
    image: support-tool:latest
    command: pnpm worker:start
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  # Pinned to a literal name — see docker-compose.yml for why (Compose's
  # default volume namespacing can drift across redeploys under some deploy
  # tools, silently orphaning old uploads). Same literal name as
  # docker-compose.yml so switching between bundled/external Postgres keeps
  # the same uploads.
  uploads:
    name: support_tool_uploads
